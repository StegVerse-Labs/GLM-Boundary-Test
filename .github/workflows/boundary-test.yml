name: Boundary Test

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  boundary-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run review-only fixture
        run: python run_boundary_test.py

      - name: Run regression fixture set
        run: python run_boundary_regression.py
